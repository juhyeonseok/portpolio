{% extends 'base.html' %}
{% load static %}

{% block title %}블로그 - HYEONSEOK's BLOG{% endblock %}

{% block content %}
<style>
    .blog-container {
        max-width: 900px;
        margin: 0 auto;
        display: flex;
        flex-direction: column;
        gap: 2.5rem;
        width: 100%;
    }

    /* Search & Filter Header Section */
    .blog-header {
        display: flex;
        flex-direction: column;
        gap: 1.5rem;
    }

    .search-bar-wrapper {
        position: relative;
        width: 100%;
    }

    .search-input {
        width: 100%;
        padding: 1.1rem 1.5rem;
        padding-left: 3.5rem;
        font-size: 1.05rem;
        background-color: var(--color-surface);
        border: 1.8px solid var(--color-border);
        border-radius: 16px;
        color: var(--color-text);
        box-shadow: 0 4px 12px var(--color-shadow);
        transition: var(--transition-bounce);
    }

    .search-input:focus {
        border-color: var(--color-primary);
        box-shadow: 0 8px 24px var(--color-primary-glow);
    }

    .search-icon {
        position: absolute;
        left: 1.3rem;
        top: 50%;
        transform: translateY(-50%);
        color: var(--color-text-muted);
        pointer-events: none;
        transition: var(--transition-smooth);
    }

    .search-input:focus + .search-icon {
        color: var(--color-primary);
    }

    /* Series Filters Styling */
    .series-filters {
        display: flex;
        flex-wrap: wrap;
        gap: 0.8rem;
        padding-bottom: 0.5rem;
    }

    .series-filter-btn {
        font-size: 0.95rem;
        font-weight: 700;
        padding: 0.6rem 1.2rem;
        border-radius: 12px;
        border: 1.5px solid var(--color-border);
        background-color: var(--color-surface);
        color: var(--color-text-muted);
        cursor: pointer;
        transition: var(--transition-bounce);
    }

    .series-filter-btn:hover,
    .series-filter-btn.active {
        background-color: var(--color-primary);
        border-color: var(--color-primary);
        color: white;
        transform: translateY(-2px);
        box-shadow: 0 6px 16px var(--color-primary-glow);
    }

    /* Blog Card Layout styles */
    .posts-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
        gap: 2rem;
        width: 100%;
    }

    .post-card {
        background-color: var(--color-card-bg);
        border: 1px solid var(--color-border);
        border-radius: 20px;
        padding: 2.2rem;
        display: flex;
        flex-direction: column;
        gap: 1.2rem;
        box-shadow: 0 8px 25px var(--color-shadow);
        transition: var(--transition-bounce);
        cursor: pointer;
        opacity: 0;
        transform: translateY(30px);
    }

    .post-card:hover {
        transform: translateY(-8px) scale(1.02);
        box-shadow: 0 16px 35px rgba(61, 41, 24, 0.12);
        border-color: var(--color-primary);
    }

    body.dark .post-card:hover {
        box-shadow: 0 16px 35px rgba(0, 0, 0, 0.6);
    }

    .post-series {
        font-size: 0.85rem;
        font-weight: 700;
        color: var(--color-primary);
        text-transform: uppercase;
        letter-spacing: 0.05em;
    }

    .post-title {
        font-size: 1.35rem;
        line-height: 1.4;
        transition: color 0.25s ease;
    }

    .post-card:hover .post-title {
        color: var(--color-primary);
    }

    .post-desc {
        font-size: 0.95rem;
        color: var(--color-text-muted);
        display: -webkit-box;
        -webkit-line-clamp: 3;
        -webkit-box-orient: vertical;
        overflow: hidden;
        flex-grow: 1;
    }

    .post-meta {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-top: auto;
        padding-top: 1rem;
        border-top: 1px solid var(--color-border);
        font-size: 0.85rem;
        color: var(--color-text-muted);
    }

    .post-likes {
        display: flex;
        align-items: center;
        gap: 0.3rem;
        font-weight: 600;
    }

    .post-likes svg {
        color: #ff4757;
        transition: transform 0.3s ease;
    }

    .post-card:hover .post-likes svg {
        transform: scale(1.3);
        animation: bouncePop 0.5s ease-in-out;
    }

    /* Pagination button micro-interactions */
    .pagination-btn {
        transition: var(--transition-bounce);
    }

    .pagination-btn:hover {
        transform: translateY(-2px);
        border-color: var(--color-primary);
        color: var(--color-primary);
    }

    .pagination-btn.active:hover {
        color: white;
    }

    /* Floating Admin "✏️ Write" Button */
    .floating-write-btn {
        position: fixed;
        bottom: 2.5rem;
        right: 2.5rem;
        background: linear-gradient(135deg, #FF9A3C 0%, #E07D20 100%);
        color: white;
        font-weight: 800;
        padding: 1rem 1.8rem;
        border-radius: 50px;
        box-shadow: 0 10px 25px rgba(224, 125, 32, 0.4);
        display: inline-flex;
        align-items: center;
        gap: 0.6rem;
        z-index: 999;
        transition: var(--transition-bounce);
        cursor: pointer;
    }

    .floating-write-btn:hover {
        transform: translateY(-5px) scale(1.03);
        box-shadow: 0 15px 35px rgba(224, 125, 32, 0.6);
    }
</style>

<div class="blog-container">

    <!-- Blog Header with Search & Series Filters -->
    <div class="blog-header">
        
        <!-- Instant Search Box -->
        <div class="search-bar-wrapper">
            <input type="text" 
                   name="q" 
                   value="{{ search_query }}"
                   class="search-input" 
                   placeholder="기술 자료, 보안 전략 또는 본문 내용을 실시간 검색하세요..."
                   hx-get="{% url 'blog:index' %}"
                   hx-trigger="keyup changed delay:400ms"
                   hx-target="#posts-list-container"
                   hx-push-url="true"
                   hx-include="[name=series]">
            
            <!-- Search Icon SVG -->
            <svg class="search-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="11" cy="11" r="8"></circle>
                <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
            </svg>
        </div>

        <!-- Series Tag filters -->
        <div class="series-filters">
            <!-- All Posts filter -->
            <button class="series-filter-btn {% if not active_series %}active{% endif %}"
                    hx-get="{% url 'blog:index' %}"
                    hx-target="#posts-list-container"
                    hx-push-url="true"
                    onclick="updateActiveSeriesFilter(this, '')">
                전체보기
            </button>
            
            {% for s in series_list %}
                <button class="series-filter-btn {% if active_series == s.slug %}active{% endif %}"
                        hx-get="{% url 'blog:index' %}?series={{ s.slug }}"
                        hx-target="#posts-list-container"
                        hx-push-url="true"
                        onclick="updateActiveSeriesFilter(this, '{{ s.slug }}')">
                    📦 {{ s.name }}
                </button>
            {% endfor %}
            
            <!-- Hidden series parameter to preserve filters during search -->
            <input type="hidden" name="series" value="{{ active_series }}">
        </div>

    </div>

    <!-- Dynamic Posts List & Pagination Segment -->
    <div id="posts-list-outer">
        {% include 'blog/partials/post_list_partial.html' %}
    </div>

</div>

<!-- Admin Floating Write Button -->
{% if user.is_authenticated and user.is_superuser %}
    <a href="/blog/write/" class="floating-write-btn animate-scale-in" title="새 블로그 포스트 작성">
        <!-- Edit/Pen SVG -->
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 20h9"></path>
            <path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"></path>
        </svg>
        새 글 작성
    </a>
{% endif %}

<!-- Helper JavaScript to sync filters -->
<script>
    function updateActiveSeriesFilter(element, slug) {
        // Toggle active states locally
        document.querySelectorAll('.series-filter-btn').forEach(btn => {
            btn.classList.remove('active');
        });
        element.classList.add('active');
        
        // Update hidden parameter for searching
        document.querySelector('[name=series]').value = slug;
        
        // Clear search input on switching series to refresh view cleanly or keep it (depends on preference)
        // Here we keep search input, but we trigger standard HTMX sync
    }
</script>
{% endblock %}
