{% extends 'base.html' %}
{% block title %}접근 권한 없음 (403) - HYEONSEOK's BLOG{% endblock %}

{% block content %}
<style>
    .error-container {
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: calc(100vh - 12rem);
        width: 100%;
        padding: 1.5rem;
    }

    .error-card {
        background-color: var(--color-card-bg);
        border: 1px solid var(--color-border);
        border-radius: 24px;
        padding: 4rem 3rem;
        width: 100%;
        max-width: 600px;
        box-shadow: 0 20px 40px var(--color-shadow);
        text-align: center;
        position: relative;
        overflow: hidden;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 1.8rem;
    }

    /* Decorative Gold/Orange Glow Circle */
    .error-card::before {
        content: '';
        position: absolute;
        top: -150px;
        left: -150px;
        width: 300px;
        height: 300px;
        background: radial-gradient(circle, rgba(230, 126, 34, 0.15) 0%, rgba(241, 196, 15, 0.05) 50%, transparent 100%);
        border-radius: 50%;
        pointer-events: none;
    }

    .error-code {
        font-size: 7.5rem;
        font-weight: 900;
        line-height: 1;
        background: linear-gradient(135deg, #f1c40f 0%, #e67e22 100%);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        letter-spacing: -2px;
        margin: 0;
        filter: drop-shadow(0 8px 16px rgba(230, 126, 34, 0.2));
        animation: pulseGlow 3s ease-in-out infinite alternate;
    }

    .error-title {
        font-size: 1.8rem;
        font-weight: 700;
        color: var(--color-text);
        margin: 0;
    }

    .error-message {
        font-size: 1rem;
        line-height: 1.6;
        color: var(--color-text-muted);
        max-width: 450px;
        margin: 0;
    }

    .error-divider {
        width: 60px;
        height: 4px;
        background: linear-gradient(90deg, #f1c40f, #e67e22);
        border-radius: 2px;
        border: none;
    }

    .error-actions {
        display: flex;
        gap: 1rem;
        margin-top: 1rem;
        width: 100%;
        justify-content: center;
    }

    .btn-error-primary {
        background: linear-gradient(135deg, #f1c40f 0%, #e67e22 100%);
        color: #fff !important;
        font-weight: 700;
        border: none;
        padding: 0.9rem 1.8rem;
        border-radius: 12px;
        cursor: pointer;
        transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
        text-decoration: none;
        display: inline-flex;
        align-items: center;
        gap: 0.6rem;
        box-shadow: 0 4px 15px rgba(230, 126, 34, 0.3);
    }

    .btn-error-primary:hover {
        transform: translateY(-2px);
        box-shadow: 0 8px 25px rgba(230, 126, 34, 0.45);
    }

    .btn-error-secondary {
        background-color: transparent;
        border: 1px solid var(--color-border);
        color: var(--color-text) !important;
        font-weight: 600;
        padding: 0.9rem 1.8rem;
        border-radius: 12px;
        cursor: pointer;
        transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
        text-decoration: none;
        display: inline-flex;
        align-items: center;
        gap: 0.6rem;
    }

    .btn-error-secondary:hover {
        background-color: var(--color-border);
        border-color: var(--color-text-muted);
        transform: translateY(-2px);
    }

    @keyframes pulseGlow {
        0% {
            filter: drop-shadow(0 8px 16px rgba(230, 126, 34, 0.15));
        }
        100% {
            filter: drop-shadow(0 8px 24px rgba(241, 196, 15, 0.35));
        }
    }
</style>

<div class="error-container">
    <div class="error-card animate-scale-in">
        <h1 class="error-code">403</h1>
        <h2 class="error-title">접근 권한이 제한되었습니다</h2>
        <hr class="error-divider">
        <p class="error-message">
            요청하신 경로는 보안상의 이유로 일반 회원 및 게스트의 접근이 엄격히 격리 차단되어 있습니다. 올바른 권한을 가진 관리자 계정으로 로그인해 주시기 바랍니다.
        </p>
        
        <div class="error-actions">
            <a href="javascript:history.back();" class="btn-error-secondary">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <line x1="19" y1="12" x2="5" y2="12"></line>
                    <polyline points="12 19 5 12 12 5"></polyline>
                </svg>
                이전 페이지
            </a>
            <a href="/" class="btn-error-primary">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path>
                    <polyline points="9 22 9 12 15 12 15 22"></polyline>
                </svg>
                메인 홈으로
            </a>
        </div>
    </div>
</div>
{% endblock %}
