<!-- Heart button and count updated by HTMX with pop micro-animations -->
<button class="btn-like-trigger {% if user_liked %}liked{% endif %}" 
        hx-post="{% url 'blog:like_post' post.pk %}" 
        hx-swap="outerHTML"
        aria-label="포스트 좋아요 토글"
        style="display: inline-flex; align-items: center; gap: 0.5rem; background-color: var(--color-surface); border: 1.5px solid {% if user_liked %}#ff4757{% else %}var(--color-border){% endif %}; color: {% if user_liked %}#ff4757{% else %}var(--color-text-muted){% endif %}; padding: 0.7rem 1.5rem; border-radius: 50px; font-weight: 700; cursor: pointer; box-shadow: 0 4px 10px var(--color-shadow); transition: var(--transition-bounce);">
    
    <!-- Heart SVG Icon (pop animation triggers on hover & render if liked) -->
    <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor" 
         style="animation: {% if user_liked %}bouncePop 0.5s ease-in-out{% else %}none{% endif %};">
        <path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"></path>
    </svg>
    <span>좋아요</span>
    <span style="color: var(--color-text-muted); font-size: 0.9rem; margin-left: 0.2rem;">{{ likes_count }}</span>
</button>
